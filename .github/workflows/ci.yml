name: CI Pipeline

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

# Cancel in-progress runs for the same workflow
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality-checks:
    name: Quality Checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run ESLint
        run: pnpm run lint
        continue-on-error: true # Don't fail the build on linting errors yet

      - name: TypeScript type checking
        run: pnpm run check-types
        # BLOCKING: Type errors prevent deployment

      - name: Run tests
        run: pnpm run test
        env:
          NODE_ENV: test
        # BLOCKING: Test failures prevent deployment

      - name: Run integration tests
        run: pnpm run test -- --testPathPattern=integration
        env:
          NODE_ENV: test
        # BLOCKING: Integration test failures prevent deployment

      - name: Check test coverage
        run: pnpm run test:coverage -- --coverageThreshold='{"global":{"lines":50}}'
        env:
          NODE_ENV: test
        continue-on-error: true # Warning only for now, will enforce later

      - name: Check for security vulnerabilities
        run: pnpm audit --audit-level=high
        continue-on-error: true # Advisory only for now

      - name: Install Playwright Browsers
        run: pnpm exec playwright install chromium --with-deps

      - name: Run E2E tests
        run: pnpm test:e2e
        env:
          NODE_ENV: test
          PLAYWRIGHT_BASE_URL: http://localhost:3000
        continue-on-error: true # Don't block on E2E failures yet (need test data setup)

      - name: Upload Playwright Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30

  database-checks:
    name: Database Migration Checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check for new migrations
        id: check-migrations
        run: |
          if [ -d "sql/migrations" ]; then
            echo "found=true" >> $GITHUB_OUTPUT
            echo "📋 Found migrations directory"
            ls -la sql/migrations/
          else
            echo "found=false" >> $GITHUB_OUTPUT
            echo "ℹ️ No migrations directory found"
          fi

      - name: Validate SQL syntax
        if: steps.check-migrations.outputs.found == 'true'
        run: |
          echo "✓ SQL files found:"
          find sql/migrations -name "*.sql" -type f | while read file; do
            echo "  - $file"
          done
          echo ""
          echo "⚠️ Remember to apply these migrations to Supabase manually"

  security-scan:
    name: Security Scanning
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'HIGH,CRITICAL'
        continue-on-error: true

      - name: Check for exposed secrets
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.repository.default_branch }}
          head: HEAD
        continue-on-error: true

  summary:
    name: Build Summary
    runs-on: ubuntu-latest
    needs: [quality-checks, database-checks, security-scan]
    if: always()

    steps:
      - name: Check build status
        run: |
          echo "### 🚀 CI Pipeline Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Quality Checks**: ${{ needs.quality-checks.result }}" >> $GITHUB_STEP_SUMMARY
          echo "**Database Checks**: ${{ needs.database-checks.result }}" >> $GITHUB_STEP_SUMMARY
          echo "**Security Scan**: ${{ needs.security-scan.result }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [ "${{ needs.quality-checks.result }}" == "success" ]; then
            echo "✅ All quality checks passed!" >> $GITHUB_STEP_SUMMARY
            echo "Ready to merge or deploy." >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ Quality checks failed." >> $GITHUB_STEP_SUMMARY
            echo "Please fix the issues before merging." >> $GITHUB_STEP_SUMMARY
          fi

      # Uncomment when you add SLACK_WEBHOOK_URL to GitHub Secrets
      # - name: Notify on Failure
      #   if: failure()
